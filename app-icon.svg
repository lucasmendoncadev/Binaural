    <!-- Left ear waves -->
    <path d="M 156 200 Q 130 256 156 312" opacity="0.5"/>
    <path d="M 136 180 Q 100 256 136 332" opacity="0.7"/>
    <path d="M 116 160 Q 70 256 116 352" opacity="0.9"/>
    <!-- Right ear waves -->
    <path d="M 356 200 Q 382 256 356 312" opacity="0.5"/>
    <path d="M 376 180 Q 412 256 376 332" opacity="0.7"/>
    <path d="M 396 160 Q 442 256 396 352" opacity="0.9"/>
